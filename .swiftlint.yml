disabled_rules:
  - todo
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping

line_length:
  warning: 180
  error: 240
  ignores_comments: true
  ignores_function_declarations: true

function_body_length:
  warning: 120
  error: 200

type_body_length:
  warning: 600
  error: 900

file_length:
  warning: 1000
  error: 1500

nesting:
  type_level:
    warning: 2
    error: 3

excluded:
  - .build
  - DerivedData
  - "**/.swiftpm"
  - "**/SourcePackages"
