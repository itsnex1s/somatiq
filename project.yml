name: Somatiq
options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    from: 2.30.6
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Somatiq:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bioself.somatiq
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Somatiq.entitlements
        TARGETED_DEVICE_FAMILY: 1
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
    scheme:
      testTargets:
        - SomatiqTests
  SomatiqTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - target: Somatiq
    sources:
      - Tests/SomatiqTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bioself.somatiq.tests
        GENERATE_INFOPLIST_FILE: YES
